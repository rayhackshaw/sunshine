# Cloudflare Pages Configuration for Sunshine App
# This project uses OpenNextJS Cloudflare adapter
# Build happens on Cloudflare's infrastructure (not locally)

name = "sunshine"
compatibility_date = "2024-09-23"

# Pages build output directory (created by opennextjs-cloudflare)
# This must point to the worker output, not just assets
pages_build_output_dir = ".open-next"

# Node.js compatibility for Prisma database client
compatibility_flags = ["nodejs_compat"]

# Build configuration for Cloudflare Pages
[build]
command = "pnpm install && npx opennextjs-cloudflare build"

[build.environment]
NODE_VERSION = "18"

# NOTE: Environment variables must be set via Cloudflare Dashboard
# Required secrets:
# - CRON_SECRET (min 32 chars, for CRON authentication)
# - OPENWEATHERMAP_API_KEY (from openweathermap.org)
# - POSTGRES_URL (Neon PostgreSQL connection string)
# - POSTGRES_PRISMA_URL (Neon pooled connection)
# - POSTGRES_URL_NON_POOLING (Neon direct connection)
# - NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN (Mapbox public token)
# - NODE_ENV (set to "production")